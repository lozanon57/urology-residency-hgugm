<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#1B3A6B"/>

  <!-- Surgeon silhouette (head + shoulders + gown) -->
  <!-- Head -->
  <circle cx="22" cy="16" r="6" fill="white" opacity="0.92"/>
  <!-- Surgeon cap -->
  <rect x="16" y="10" width="12" height="4" rx="2" fill="#C8933A"/>
  <!-- Gown body -->
  <path d="M13 38 Q13 28 22 26 Q31 28 31 38 Z" fill="white" opacity="0.85"/>
  <!-- Gown collar V -->
  <path d="M18 26 L22 31 L26 26" fill="none" stroke="#1B3A6B" stroke-width="1.2" stroke-linejoin="round"/>
  <!-- Arm extended holding scalpel -->
  <path d="M28 33 L36 28" stroke="white" stroke-width="2.8" stroke-linecap="round" opacity="0.9"/>

  <!-- Scalpel handle -->
  <rect x="35" y="22" width="14" height="4" rx="2" fill="#C8933A" transform="rotate(-35 35 22)"/>
  <!-- Scalpel blade -->
  <path d="M45 14 L51 10 L52 13 L47 19 Z" fill="white" opacity="0.95"/>
  <!-- Blade edge highlight -->
  <line x1="51" y1="10" x2="47" y2="19" stroke="#C8933A" stroke-width="0.8" stroke-linecap="round"/>

  <!-- HGUGM text -->
  <text x="32" y="57" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" font-weight="700" fill="rgba(255,255,255,0.8)" letter-spacing="0.5">HGUGM</text>
</svg>
